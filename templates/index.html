<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Sentiment Gauge</title>
    <!-- Include Plotly.js for the gauge -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            background-color: #191919; /* Matches Notion dark theme card */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #ffffff;
        }

        .card {
            background: #191919; /* Unified dark background */
            padding: 10px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
        }

        #status-banner {
            font-size: 20px;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Dynamic status background colors */
        .bullish { background-color: #238636; }
        .bearish { background-color: #da3633; }
        .neutral { background-color: #8957e5; }

        #score-display {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Status Banner -->
        <div id="status-banner" class="neutral">Loading Sentiment...</div>

        <!-- Gauge Chart Container -->
        <div id="gauge-chart"></div>

        <!-- Numerical Score -->
        <div id="score-display">--</div>
    </div>

    <script>
        async function updateGauge() {
            try {
                const response = await fetch('/api/score');
                const data = await response.json();

                const score = data.score;
                const status = data.status;

                // Update Status Banner Text and Class
                const banner = document.getElementById('status-banner');
                banner.innerText = status;
                
                banner.className = ""; // clear old classes
                if (status.includes("Bullish")) {
                    banner.classList.add('bullish');
                } else if (status.includes("Bearish")) {
                    banner.classList.add('bearish');
                } else {
                    banner.classList.add('neutral');
                }

                // Update Numerical Score
                document.getElementById('score-display').innerText = score.toFixed(4);

                // Render Plotly Gauge matching dark theme
                var chartData = [
                    {
                        domain: { x: [0, 1], y: [0, 1] },
                        value: score,
                        title: { text: "<b>USD Macro Sentiment</b>", font: { color: "#ffffff", size: 16 } },
                        type: "indicator",
                        mode: "gauge+number",
                        gauge: {
                            axis: { range: [-1, 1], tickcolor: "#ffffff", tickfont: { color: "#ffffff" } },
                            bar: { color: "#58a6ff" },
                            bgcolor: "#191919",
                            borderwidth: 2,
                            bordercolor: "#30363d",
                            steps: [
                                { range: [-1, -0.3], color: "rgba(218, 54, 51, 0.3)" },
                                { range: [-0.3, 0.3], color: "rgba(137, 87, 229, 0.2)" },
                                { range: [0.3, 1], color: "rgba(35, 134, 54, 0.3)" }
                            ],
                        }
                    }
                ];

                var layout = { 
                    width: 350, 
                    height: 250, 
                    margin: { t: 25, b: 25, l: 25, r: 25 },
                    paper_bgcolor: "#191919", // Matches dark theme container
                    plot_bgcolor: "#191919",   // Matches dark theme container
                    font: { color: "#ffffff" }
                };

                Plotly.newPlot('gauge-chart', chartData, layout, {responsive: true, displayModeBar: false});

            } catch (error) {
                console.error("Error updating gauge:", error);
            }
        }

        // Run on load
        updateGauge();
    </script>
</body>
</html>
